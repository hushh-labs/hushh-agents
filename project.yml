name: HushhAgents
options:
  bundleIdPrefix: com.hushhone
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

configs:
  Debug UAT: debug
  Release UAT: release
  Debug Prod: debug
  Release Prod: release

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "7.0.0"

targets:
  HushhAgents:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HushhAgents
        excludes:
          - "**/.DS_Store"
    resources:
      - path: HushhAgents/Resources/Agents.json
      - path: HushhAgents/Resources/kirkland_agents_seed.json
      - path: HushhAgents/Config/Supabase.plist
      - path: HushhAgents/Resources/Assets.xcassets
      - path: HushhAgents/Resources/agent_photos
        buildPhase: resources
      - path: HushhAgents/Resources/Fonts
        buildPhase: resources
    settings:
      base:
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: HushhAgents/Config/Info.plist
        MARKETING_VERSION: "1.0.2"
        CURRENT_PROJECT_VERSION: "143"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "WVDK9JW99C"
      configs:
        Debug UAT:
          PRODUCT_BUNDLE_IDENTIFIER: com.hushhone.hushh.agent.uat
          CODE_SIGN_ENTITLEMENTS: HushhAgents/HushhAgentsDeviceDebug.entitlements
          DEV_ADMIN_ENABLED: "YES"
          DEV_ADMIN_EMAIL: "admin@hushhagents.dev"
          BUNDLE_DISPLAY_NAME: "Hushh Agent UAT"
        Release UAT:
          PRODUCT_BUNDLE_IDENTIFIER: com.hushhone.hushh.agent.uat
          CODE_SIGN_ENTITLEMENTS: HushhAgents/HushhAgentsDeviceDebug.entitlements
          DEV_ADMIN_ENABLED: "YES"
          DEV_ADMIN_EMAIL: "admin@hushhagents.dev"
          BUNDLE_DISPLAY_NAME: "Hushh Agent UAT"
        Debug Prod:
          PRODUCT_BUNDLE_IDENTIFIER: com.hushhone.hushh.agent
          CODE_SIGN_ENTITLEMENTS: HushhAgents/HushhAgents.entitlements
          DEV_ADMIN_ENABLED: "NO"
          DEV_ADMIN_EMAIL: ""
          BUNDLE_DISPLAY_NAME: "Hushh Agent"
        Release Prod:
          PRODUCT_BUNDLE_IDENTIFIER: com.hushhone.hushh.agent
          CODE_SIGN_ENTITLEMENTS: HushhAgents/HushhAgents.entitlements
          DEV_ADMIN_ENABLED: "NO"
          DEV_ADMIN_EMAIL: ""
          BUNDLE_DISPLAY_NAME: "Hushh Agent"
    dependencies:
      - package: Supabase
      - package: GoogleSignIn

schemes:
  HushhAgents-UAT:
    build:
      targets:
        HushhAgents: all
    run:
      config: Debug UAT
    test:
      config: Debug UAT
    profile:
      config: Release UAT
    analyze:
      config: Debug UAT
    archive:
      config: Release UAT

  HushhAgents-Prod:
    build:
      targets:
        HushhAgents: all
    run:
      config: Debug Prod
    test:
      config: Debug Prod
    profile:
      config: Release Prod
    analyze:
      config: Debug Prod
    archive:
      config: Release Prod
